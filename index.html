<!doctype html>
<html lang="en">

<head>
  <!-- Page metadata and stylesheet link -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile Card</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Page wrapper that centers content -->
  <div class="page">

    <!-- Profile card content -->
    <div class="card">

      <img class="avatar" src="image/pfp.jpg" alt="Omar @html-error404 github profile photo">
      <div class="profile">

        <div class="profile-name">
          <span class="name">Omar</span>
          <span class="handle">@html-error404</span>
        </div>
        <div class="role">Fullstack Developer</div>
        <div class="location">Rabat, Morocco</div>

      </div>
    </div>
  </div>
</body>
</html>
